<!DOCTYPE html>
<html>
<head>
  <title>Pick What You Feel ❤️</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 400px;
    }

    img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #ff6b81;
      color: white;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    h2 {
      color: #444;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Pick what you feel ❤️</h2>
  <img id="chitImage" src="">
  <br>
  <button onclick="loadRandom()">Pick another</button>
</div>

<script src="script.js"></script>

</body>
</html>
